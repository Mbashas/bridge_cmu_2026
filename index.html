<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DogDetector — Edge Impulse</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 1.25rem 2rem;
    background: #161922;
    border-bottom: 1px solid #2a2d38;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  header .logo { font-size: 1.5rem; }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; }
  header span.badge {
    font-size: .65rem;
    background: #6c63ff;
    padding: .2rem .55rem;
    border-radius: 9999px;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: .06em;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem;
    gap: 1.5rem;
    max-width: 520px;
    width: 100%;
  }

  .video-container {
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #2a2d38;
    background: #1a1d27;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-container .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 17, 23, .7);
    font-size: .95rem;
    color: #8b8fa3;
    pointer-events: none;
  }

  canvas { display: none; }

  button#scan {
    width: 400px;
    padding: .9rem 0;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #6c63ff;
    color: #fff;
    transition: background .2s, transform .1s;
  }

  button#scan:hover { filter: brightness(0.9); }
  button#scan:active { transform: scale(.98); }
  button#scan:disabled {
    background: #3b3d4a;
    color: #6b6e7a;
    cursor: not-allowed;
    transform: none;
  }

  .result-panel {
    width: 400px;
    min-height: 80px;
    border-radius: 12px;
    background: #161922;
    border: 1px solid #2a2d38;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    gap: .5rem;
    text-align: center;
  }

  .result-panel.detected {
    border-color: #34d399;
    background: rgba(52, 211, 153, .08);
  }

  .result-panel.not-detected {
    border-color: #f87171;
    background: rgba(248, 113, 113, .06);
  }

  .result-panel.error {
    border-color: #fbbf24;
    background: rgba(251, 191, 36, .06);
  }

  .result-panel .primary {
    font-size: 1.4rem;
    font-weight: 700;
  }

  .result-panel .secondary {
    font-size: .85rem;
    color: #8b8fa3;
  }

  /* Spinner */
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #2a2d38;
    border-top-color: #6c63ff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .confidence-bar {
    width: 100%;
    max-width: 280px;
    height: 8px;
    background: #2a2d38;
    border-radius: 4px;
    overflow: hidden;
    margin-top: .25rem;
  }

  .confidence-bar .fill {
    height: 100%;
    border-radius: 4px;
    transition: width .4s ease;
  }

  footer {
    padding: 1rem;
    font-size: .75rem;
    color: #4a4d5a;
  }
</style>
</head>
<body>

<header>
  <span class="logo">🐕</span>
  <h1>DogDetector</h1>
  <span class="badge">Edge Impulse</span>
</header>

<main>
  <div class="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <div class="overlay" id="camOverlay">Requesting camera access…</div>
  </div>

  <canvas id="captureCanvas" width="400" height="400"></canvas>

  <button id="scan" disabled>Start Scanning</button>

  <div class="result-panel" id="resultPanel">
    <span class="secondary">Press the button to begin live scanning</span>
  </div>
</main>

<footer>Inference via localhost:1337 &middot; Model: 96&times;96 Grayscale</footer>

<audio id="alertSound" preload="auto" src="https://www.soundjay.com/misc_c2026/sounds/hohner-melodica-2.mp3"></audio>

<script>
  const video      = document.getElementById('webcam');
  const overlay    = document.getElementById('camOverlay');
  const canvas     = document.getElementById('captureCanvas');
  const scanBtn    = document.getElementById('scan');
  const panel      = document.getElementById('resultPanel');
  const alertSound = document.getElementById('alertSound');
  const ctx        = canvas.getContext('2d');

  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 400 }, height: { ideal: 400 }, facingMode: 'environment' }
      });
      video.srcObject = stream;
      await video.play();
      overlay.style.display = 'none';
      scanBtn.disabled = false;
    } catch (err) {
      overlay.textContent = 'Camera access denied or unavailable';
    }
  }

  function captureFrame() {
    ctx.drawImage(video, 0, 0, 400, 400);
    return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
  }

  function setResult(type, primary, secondary) {
    panel.className = 'result-panel' + (type ? ' ' + type : '');
    panel.innerHTML = '';

    const p = document.createElement('div');
    p.className = 'primary';
    p.textContent = primary;
    panel.appendChild(p);

    if (secondary !== undefined) {
      const s = document.createElement('div');
      s.className = 'secondary';
      s.textContent = secondary;
      panel.appendChild(s);
    }
  }

  function showLoading() {
    panel.className = 'result-panel';
    panel.innerHTML = '<div class="spinner"></div>';
  }

  function showConfidenceBar(score, isDog) {
    const bar = document.createElement('div');
    bar.className = 'confidence-bar';
    const fill = document.createElement('div');
    fill.className = 'fill';
    fill.style.width = (score * 100).toFixed(1) + '%';
    fill.style.background = isDog ? '#34d399' : '#f87171';
    bar.appendChild(fill);
    panel.appendChild(bar);
  }

  let scanning = false;
  let scanTimer = null;
  const SCAN_INTERVAL = 1500;

  async function scanOnce() {
    try {
      const blob = await captureFrame();
      const form = new FormData();
      form.append('file', blob, 'frame.jpg');

      const res = await fetch('/proxy-scan', { method: 'POST', body: form });
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);

      const data = await res.json();
      const classification = data.result.classification;
      const dogScore = classification.dog;
      const isDog = dogScore > 0.6;

      if (isDog) {
        setResult('detected', '\u{1F436} DOG DETECTED!', `Confidence: ${(dogScore * 100).toFixed(1)}%`);
        alertSound.currentTime = 0;
        alertSound.play().catch(() => {});
      } else {
        setResult('not-detected', '\u274C No dog found.', `Dog confidence: ${(dogScore * 100).toFixed(1)}%`);
      }

      showConfidenceBar(dogScore, isDog);
    } catch (err) {
      setResult('error', '\u26A0\uFE0F Connection Error', 'Error: Could not connect to local Inference Server.');
    }
  }

  function startScanning() {
    scanning = true;
    scanBtn.textContent = 'Stop Scanning';
    scanBtn.style.background = '#ef4444';

    async function loop() {
      if (!scanning) return;
      await scanOnce();
      if (scanning) scanTimer = setTimeout(loop, SCAN_INTERVAL);
    }
    loop();
  }

  function stopScanning() {
    scanning = false;
    clearTimeout(scanTimer);
    scanBtn.textContent = 'Start Scanning';
    scanBtn.style.background = '';
  }

  scanBtn.addEventListener('click', () => {
    if (scanning) stopScanning();
    else startScanning();
  });

  initCamera();
</script>
</body>
</html>
